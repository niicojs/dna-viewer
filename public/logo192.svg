<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="#0d1f2d"/>
  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#1a3a4a" stop-opacity="1"/>
    <stop offset="100%" stop-color="#0d1f2d" stop-opacity="1"/>
  </radialGradient>
  <rect width="192" height="192" rx="42" fill="url(#glow)"/>

  <!-- Left strand (teal) — sinusoidal path -->
  <path d="M72 16
           C60 32, 84 48, 72 64
           C60 80, 84 96, 72 112
           C60 128, 84 144, 72 160
           C64 172, 72 178, 72 178"
        stroke="#3dd6c8" stroke-width="8" stroke-linecap="round" fill="none"
        filter="url(#teal-glow)"/>

  <!-- Right strand (green) — opposite phase -->
  <path d="M120 16
           C132 32, 108 48, 120 64
           C132 80, 108 96, 120 112
           C132 128, 108 144, 120 160
           C128 172, 120 178, 120 178"
        stroke="#5edc8a" stroke-width="8" stroke-linecap="round" fill="none"
        filter="url(#green-glow)"/>

  <!-- Glow filters -->
  <defs>
    <filter id="teal-glow" x="-40%" y="-5%" width="180%" height="110%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="green-glow" x="-40%" y="-5%" width="180%" height="110%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Base pairs (rungs) — alternating colors, fade at tips -->
  <line x1="72" y1="30"  x2="120" y2="30"  stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
  <line x1="72" y1="47"  x2="120" y2="47"  stroke="#3dd6c8" stroke-width="5" stroke-linecap="round" opacity="0.70"/>
  <line x1="72" y1="64"  x2="120" y2="64"  stroke="#5edc8a" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <line x1="72" y1="80"  x2="120" y2="80"  stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <line x1="72" y1="96"  x2="120" y2="96"  stroke="#3dd6c8" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  <line x1="72" y1="112" x2="120" y2="112" stroke="#5edc8a" stroke-width="5" stroke-linecap="round" opacity="0.60"/>
  <line x1="72" y1="128" x2="120" y2="128" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <line x1="72" y1="145" x2="120" y2="145" stroke="#3dd6c8" stroke-width="5" stroke-linecap="round" opacity="0.70"/>
  <line x1="72" y1="162" x2="120" y2="162" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.25"/>

  <!-- Dots at strand ends (top) -->
  <circle cx="72"  cy="16" r="5" fill="#3dd6c8" opacity="0.9"/>
  <circle cx="120" cy="16" r="5" fill="#5edc8a" opacity="0.9"/>
  <!-- Dots at strand ends (bottom) -->
  <circle cx="72"  cy="178" r="5" fill="#3dd6c8" opacity="0.9"/>
  <circle cx="120" cy="178" r="5" fill="#5edc8a" opacity="0.9"/>
</svg>
