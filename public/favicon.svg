<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0d1f2d"/>

  <!-- Left helix strand (teal) -->
  <path d="M11 4 C9 8, 13 10, 11 14 C9 18, 13 20, 11 24 C9 28, 11 30, 11 30"
        stroke="#3dd6c8" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Right helix strand (green) -->
  <path d="M21 4 C23 8, 19 10, 21 14 C23 18, 19 20, 21 24 C23 28, 21 30, 21 30"
        stroke="#5edc8a" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Base pairs (rungs) -->
  <line x1="11" y1="7"  x2="21" y2="7"  stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="11" y1="11" x2="21" y2="11" stroke="#3dd6c8" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="11" y1="14" x2="21" y2="14" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="11" y1="18" x2="21" y2="18" stroke="#5edc8a" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="11" y1="21" x2="21" y2="21" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="11" y1="25" x2="21" y2="25" stroke="#3dd6c8" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
</svg>
